services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: shalvinat
      MONGO_INITDB_ROOT_PASSWORD: shalvinat_dev_password
      MONGO_INITDB_DATABASE: shalvinat_hms
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
